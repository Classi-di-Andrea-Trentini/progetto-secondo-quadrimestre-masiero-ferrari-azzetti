<nav class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">

      <!-- Logo -->
      <div class="flex shrink-0 items-center">
        <a routerLink="/home" routerLinkActive="" [routerLinkActiveOptions]="{exact: true}"
          class="transition-transform duration-200 hover:scale-105">
          <img src="commonEra.png" alt="CommonEra" class="h-9 w-auto" />
        </a>
      </div>

      <!-- Desktop navigation links -->
      <div class="hidden sm:flex items-center gap-1">
        <a routerLink="/home" routerLinkActive="text-black font-semibold after:scale-x-100"
          [routerLinkActiveOptions]="{exact: true}"
          class="relative px-4 py-2 text-sm font-medium text-gray-500 hover:text-black transition-colors duration-200
                 after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-black
                 after:scale-x-0 after:origin-left after:transition-transform after:duration-200 hover:after:scale-x-100">
          Home
        </a>
        <a routerLink="/products" routerLinkActive="text-black font-semibold after:scale-x-100"
          class="relative px-4 py-2 text-sm font-medium text-gray-500 hover:text-black transition-colors duration-200
                 after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-black
                 after:scale-x-0 after:origin-left after:transition-transform after:duration-200 hover:after:scale-x-100">
          Products
        </a>
      </div>

      <!-- Right side icons -->
      <div class="flex items-center gap-1">
        <!-- Cart icon -->
        <a routerLink="/cart"
          class="p-2 rounded-full text-gray-500 hover:text-black hover:bg-gray-100 transition-colors duration-200"
          aria-label="Cart">
          <i class="fa-solid fa-bag-shopping text-lg"></i>
        </a>

        <!-- User icon -->
        <a routerLink="/me" routerLinkActive="text-black bg-gray-100"
          class="p-2 rounded-full text-gray-500 hover:text-black hover:bg-gray-100 transition-colors duration-200"
          aria-label="Profile">
          <i class="fa-regular fa-user text-lg"></i>
        </a>

        <!-- Mobile menu button -->
        <button type="button" command="--toggle" commandfor="mobile-menu"
          class="sm:hidden p-2 rounded-full text-gray-500 hover:text-black hover:bg-gray-100 transition-colors duration-200"
          aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"
            class="size-5 in-aria-expanded:hidden">
            <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"
            class="size-5 not-in-aria-expanded:hidden">
            <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile menu -->
  <el-disclosure id="mobile-menu" hidden class="block sm:hidden border-t border-gray-100">
    <div class="px-4 py-3 space-y-1">
      <a routerLink="/home" routerLinkActive="bg-gray-100 text-black font-semibold"
        [routerLinkActiveOptions]="{exact: true}"
        class="block rounded-lg px-3 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-black transition-colors duration-200">
        Home
      </a>
      <a routerLink="/products" routerLinkActive="bg-gray-100 text-black font-semibold"
        class="block rounded-lg px-3 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-black transition-colors duration-200">
        Products
      </a>
      <a routerLink="/cart"
        class="block rounded-lg px-3 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-black transition-colors duration-200">
        Cart
      </a>
      <a routerLink="/me" routerLinkActive="bg-gray-100 text-black font-semibold"
        class="block rounded-lg px-3 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-black transition-colors duration-200">
        Profile
      </a>
    </div>
  </el-disclosure>
</nav>
